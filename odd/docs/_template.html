<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>$title$</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:           #fafaf7;
  --surface:      #ffffff;
  --ink:          #1f2937;
  --ink-heading:  #0f172a;
  --muted:        #64748b;
  --accent:       #0e7490;
  --accent-soft:  #ecfeff;
  --accent-hover: #0891b2;
  --border:       #e5e7eb;
  --rule:         #d1d5db;
  --code-bg:      #f1f5f9;
  --code-ink:     #334155;
  --pre-bg:       #0f172a;
  --pre-ink:      #e2e8f0;
  --shadow:       0 1px 2px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.05);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.7;
  font-size:16px;
  margin:0;
  -webkit-font-smoothing:antialiased;
}

/* Layout */
.layout{
  display:grid;
  grid-template-columns: 260px 1fr;
  max-width:1440px;
  margin:0 auto;
  gap:3rem;
  padding:0 2rem;
}
@media (max-width: 900px){
  .layout{grid-template-columns:1fr;gap:0}
  nav#TOC{position:static !important;max-height:none !important;border-right:none;border-bottom:1px solid var(--border);padding:1rem 0 1.5rem !important}
}

/* Header band */
header.brand{
  background:linear-gradient(135deg, #0f172a 0%, #0e7490 100%);
  color:#fff;
  padding:2.4rem 2rem 2rem;
  margin-bottom:3rem;
}
header.brand .inner{
  max-width:1440px;
  margin:0 auto;
  padding:0 0rem;
}
header.brand .eyebrow{
  font-size:.78rem;
  text-transform:uppercase;
  letter-spacing:.18em;
  opacity:.75;
  margin-bottom:.4rem;
  font-weight:500;
}
header.brand h1.brand-title{
  font-size:2.4rem;
  font-weight:700;
  letter-spacing:-0.02em;
  margin:0 0 .3rem;
  border:none;
  color:#fff;
}
header.brand .tagline{
  color:#cffafe;
  font-family:'Lora', serif;
  font-style:italic;
  font-size:1.05rem;
  margin:0;
  opacity:.95;
}

/* TOC sidebar */
nav#TOC{
  position:sticky;
  top:1.5rem;
  align-self:start;
  padding:1.5rem 0;
  max-height:calc(100vh - 3rem);
  overflow-y:auto;
  font-size:.88rem;
  border-right:1px solid var(--border);
  padding-right:1.4rem;
}
nav#TOC::-webkit-scrollbar{width:6px}
nav#TOC::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
nav#TOC ul{
  list-style:none;
  padding-left:0;
  margin:0;
}
nav#TOC > ul > li{margin-bottom:.3rem}
nav#TOC ul ul{padding-left:1rem;margin-top:.2rem}
nav#TOC a{
  color:var(--muted);
  text-decoration:none;
  display:block;
  padding:.25rem .6rem;
  border-radius:5px;
  border-left:2px solid transparent;
  transition:all .15s ease;
  font-weight:500;
}
nav#TOC a:hover{
  color:var(--accent);
  background:var(--accent-soft);
  border-left-color:var(--accent);
}
nav#TOC a.active{
  color:var(--accent);
  background:var(--accent-soft);
  border-left-color:var(--accent);
  font-weight:600;
}

/* Main content */
main{
  max-width:920px;
  padding:.5rem 0 4rem;
}
main h1:first-child{display:none}

/* Typography */
h1,h2,h3,h4{
  color:var(--ink-heading);
  letter-spacing:-0.015em;
  scroll-margin-top:1.5rem;
}
h1{font-size:2.1rem;font-weight:700;margin:0 0 1.4rem;padding-bottom:.5rem;border-bottom:3px solid var(--accent)}
h2{font-size:1.5rem;font-weight:600;margin:2.6rem 0 .8rem;padding-bottom:.35rem;border-bottom:1px solid var(--rule)}
h3{font-size:1.15rem;font-weight:600;color:var(--accent);margin:1.8rem 0 .6rem}

p{margin:.9rem 0}
strong{color:var(--ink-heading);font-weight:600}

a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s}
a:hover{border-bottom-color:var(--accent)}

/* Inline + block code */
code{
  font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,monospace;
  background:var(--code-bg);
  color:var(--code-ink);
  padding:1px 6px;
  border-radius:4px;
  font-size:.85em;
  font-weight:500;
  border:1px solid #e2e8f0;
}
pre{
  font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,monospace;
  background:var(--pre-bg);
  color:var(--pre-ink);
  padding:1.1rem 1.3rem;
  border-radius:8px;
  overflow-x:auto;
  font-size:.84em;
  line-height:1.6;
  margin:1.2rem 0;
  box-shadow:var(--shadow);
}
pre code{background:none;color:inherit;padding:0;border:none;font-size:1em;font-weight:400}

/* Lists */
ul,ol{padding-left:1.6rem;margin:.7rem 0 1rem}
li{margin:.3rem 0}
li::marker{color:var(--accent)}

/* Blockquote */
blockquote{
  border-left:3px solid var(--accent);
  background:var(--accent-soft);
  margin:1.2rem 0;
  padding:.7rem 1.2rem;
  border-radius:0 6px 6px 0;
  color:var(--ink);
}
blockquote p:first-child{margin-top:0}
blockquote p:last-child{margin-bottom:0}

/* Tables */
table{
  border-collapse:separate;
  border-spacing:0;
  margin:1.4rem 0;
  font-size:.93em;
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
thead{background:#0f172a;color:#f8fafc}
th{padding:.6rem .9rem;text-align:left;font-weight:600;font-size:.88em;letter-spacing:.01em}
td{padding:.55rem .9rem;border-top:1px solid var(--border);vertical-align:top}
tbody tr:nth-child(even){background:#f8fafc}

hr{border:none;border-top:1px solid var(--rule);margin:2.4rem 0}

/* Footer */
footer.foot{
  max-width:1440px;
  margin:3rem auto 2rem;
  padding:1.5rem 2rem;
  color:var(--muted);
  font-size:.85rem;
  border-top:1px solid var(--border);
  text-align:center;
  font-family:'Lora',serif;
  font-style:italic;
}
</style>
</head>
<body>

<header class="brand">
  <div class="inner">
    <div class="eyebrow">$eyebrow$</div>
    <h1 class="brand-title">$brand-title$</h1>
    <p class="tagline">$tagline$</p>
  </div>
</header>

<div class="layout">
  $if(toc)$
  $table-of-contents$
  $endif$
  <main>
  $body$
  </main>
</div>

<footer class="foot">openmetadata · poc notes</footer>

<script>
// Smooth-scroll active TOC link
document.addEventListener('DOMContentLoaded', () => {
  const tocLinks = document.querySelectorAll('nav#TOC a[href^="#"]');
  if (!tocLinks.length) return;
  const targets = Array.from(tocLinks).map(a => document.getElementById(a.getAttribute('href').slice(1))).filter(Boolean);
  const linkFor = new Map();
  tocLinks.forEach(a => linkFor.set(a.getAttribute('href').slice(1), a));
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      const id = e.target.id;
      const link = linkFor.get(id);
      if (!link) return;
      if (e.isIntersecting) {
        tocLinks.forEach(a => a.classList.remove('active'));
        link.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  targets.forEach(t => obs.observe(t));
});
</script>
</body>
</html>
